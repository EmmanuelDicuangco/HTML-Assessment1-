<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Sampler</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: url('https://www.shutterstock.com/image-vector/blue-white-abstract-swirl-liquid-260nw-2714865891.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: repeat;
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 2rem;
    }

    .page1-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .page2-container {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .tts-column {
      flex: 1;
      min-width: 280px;
    }

    .audio-column {
      flex: 2;
      min-width: 320px;
    }

    h1 {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 2rem;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      letter-spacing: 2px;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      border-left: 4px solid #ffad4a;
      padding-left: 1rem;
    }

    .audio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .audio-btn {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 1rem;
      padding: 1.2rem 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      font-family: inherit;
    }

    .audio-btn:hover {
      background: rgba(255, 180, 70, 0.85);
      transform: translateY(-5px) scale(1.02);
      border-color: #ffcc88;
    }

    .audio-btn:hover .sample-name {
      color: #1a1a2e;
    }

    .sample-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: #ffecbf;
      transition: color 0.2s;
    }

    .sample-duration {
      font-size: 0.75rem;
      color: #c0b28a;
      display: block;
      margin-top: 6px;
      font-family: monospace;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .page-btn {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      font-size: 1.5rem;
      font-weight: bold;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      color: white;
      transition: all 0.2s;
    }

    .page-btn:hover:not(:disabled) {
      background: #ff9f40;
      transform: scale(1.05);
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-indicator {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      color: #ffdd99;
      font-size: 1rem;
    }

    .status {
      text-align: center;
      margin-top: 1.5rem;
      padding: 0.8rem;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      color: #ffdd99;
      font-size: 0.9rem;
    }

    .tts-card {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid rgba(255, 180, 70, 0.5);
    }

    label {
      font-weight: 600;
      color: #ffe0ae;
      display: block;
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }

    textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #ffb45e;
      border-radius: 1rem;
      padding: 0.9rem;
      color: #fff3e0;
      font-family: monospace;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
    }

    textarea:focus {
      border-color: #ffaa44;
      box-shadow: 0 0 0 2px #ffb5527f;
    }

    .speak-btn {
      background: linear-gradient(95deg, #e67e22, #c95f0e);
      border: none;
      width: 100%;
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 3rem;
      font-weight: bold;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
    }

    .speak-btn:hover {
      background: linear-gradient(95deg, #ffa654, #e57324);
      transform: scale(1.01);
    }

    .tts-status {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.8rem;
      color: #e7cf97;
    }

    @media (max-width: 850px) {
      body { padding: 1rem; }
      .audio-grid { grid-template-columns: repeat(2, 1fr); }
      .sample-name { font-size: 0.9rem; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const AUDIO_FILES = {
      "ah-ha": "ah-ha.mp3",
      "dan": "dan.mp3",
      "back-of-the-net": "back-of-the-net.mp3",
      "bangoutoforder": "bangoutoforder.mp3",
      "jurassic-park": "jurassic-park.mp3",
      "smell-my-cheese": "smell-my-cheese.mp3",
      "goal": "goal.mp3",
      "kiss-my-face": "kiss-my-face2.mp3",
      "hellopartridge": "hellopartridge.mp3"
    };
    
    const ALL_SAMPLES = [
      { name: "Ah-Ha", fileKey: "ah-ha", duration: 1.4 },
      { name: "Dan", fileKey: "dan", duration: 0.5 },
      { name: "Back of the net", fileKey: "back-of-the-net", duration: 1.0 },
      { name: "Bang out of order", fileKey: "bangoutoforder", duration: 1.4 },
      { name: "Jurassic Park", fileKey: "jurassic-park", duration: 1.5 },
      { name: "Smell my cheese", fileKey: "smell-my-cheese", duration: 1.9 },
      { name: "Goal", fileKey: "goal", duration: 1.5 },
      { name: "Kiss my face", fileKey: "kiss-my-face", duration: 1.1 },
      { name: "Hello Partridge", fileKey: "hellopartridge", duration: 2.3 }
    ];

    let currentPage = 0;  
    let activeAudio = null;

    const app = document.getElementById('app');

    function formatDuration(seconds) {
      return `${seconds.toFixed(1)}s`;
    }

    function stopAudio() {
      if (activeAudio) {
        activeAudio.pause();
        activeAudio = null;
      }
    }

    function playSample(sample, statusElementId) {
      stopAudio();
      const filePath = AUDIO_FILES[sample.fileKey];
      if (!filePath) {
        const statusEl = document.getElementById(statusElementId);
        if (statusEl) statusEl.textContent = ` Error: No file for "${sample.name}"`;
        return;
      }
      const audio = new Audio(filePath);
      activeAudio = audio;
      
      const statusEl = document.getElementById(statusElementId);
      if (statusEl) statusEl.textContent = ` Playing: "${sample.name}" ...`;
      
      audio.play().catch(err => {
        if (statusEl) statusEl.textContent = ` Cannot play "${sample.name}". Make sure "${filePath}" exists`;
        activeAudio = null;
      });
      
      audio.onended = () => {
        if (activeAudio === audio) activeAudio = null;
        if (statusEl) statusEl.textContent = ` Finished: "${sample.name}"`;
        setTimeout(() => {
          if (statusEl && statusEl.textContent.includes("Finished")) {
            statusEl.textContent = ` Click any sample to play`;
          }
        }, 1500);
      };
    }

    function renderSoundboard(containerId, statusId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '';
      ALL_SAMPLES.forEach(sample => {
        const btn = document.createElement('button');
        btn.className = 'audio-btn';
        btn.innerHTML = `
          <div class="sample-name">${sample.name}</div>
          <span class="sample-duration"> ${formatDuration(sample.duration)}</span>
        `;
        btn.addEventListener('click', () => playSample(sample, statusId));
        container.appendChild(btn);
      });
    }

    function renderPage1() {
      return `
        <div class="page1-container">
          <h1> AUDIO SAMPLER</h1>
          <div id="audioGridPage1" class="audio-grid"></div>
          <div class="pagination">
            <button class="page-btn" id="prevPageBtn">◀</button>
            <span class="page-indicator" id="pageIndicator">Page 1 / 2</span>
            <button class="page-btn" id="nextPageBtn">▶</button>
          </div>
          <div class="status" id="playStatusPage1">Click any sample to play</div>
        </div>
      `;
    }

    function renderPage2() {
      return `
        <div class="page2-container">
          <!-- LEFT COLUMN: Text to Speech -->
          <div class="tts-column">
            <h2>TEXT TO SPEECH</h2>
            <div class="tts-card">
              <label>Type your message:</label>
              <textarea id="ttsMessage" rows="4" placeholder="e.g., 'Hello there!', 'This is awesome!', 'Lovely stuff!'"></textarea>
              <button id="speechButton" class="speak-btn">CONVERT & PLAY IMMEDIATELY</button>
              <div class="tts-status" id="ttsFeedback">Type anything, click button — instant speech</div>
            </div>
          </div>
          
          <!-- RIGHT COLUMN: Audio Sampler -->
          <div class="audio-column">
            <h2>AUDIO SAMPLER</h2>
            <div id="audioGridPage2" class="audio-grid"></div>
            <div class="pagination">
              <button class="page-btn" id="prevPageBtn2">◀</button>
              <span class="page-indicator" id="pageIndicator2">Page 2 / 2</span>
              <button class="page-btn" id="nextPageBtn2">▶</button>
            </div>
            <div class="status" id="playStatusPage2">Click any sample to play</div>
          </div>
        </div>
      `;
    }

    function setupTextToSpeech() {
      const ttsTextarea = document.getElementById('ttsMessage');
      const speakBtn = document.getElementById('speechButton');
      const ttsFeedback = document.getElementById('ttsFeedback');
      
      if (!speakBtn) return;
      
      function textToSpeech() {
        const text = ttsTextarea.value.trim();
        if (!text) {
          if (ttsFeedback) ttsFeedback.textContent = ' Please type a message first!';
          return;
        }
        
        if (window.speechSynthesis && window.speechSynthesis.speaking) {
          window.speechSynthesis.cancel();
        }
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB';
        utterance.rate = 0.95;
        utterance.pitch = 1.05;
        
        if (ttsFeedback) {
          ttsFeedback.textContent = ` Speaking: "${text.substring(0, 50)}${text.length > 50 ? '...' : ''}"`;
        }
        
        utterance.onstart = () => {
          if (ttsFeedback) ttsFeedback.textContent = ` Playing audio now...`;
        };
        
        utterance.onend = () => {
          if (ttsFeedback) ttsFeedback.textContent = ` Speech finished! Type another message.`;
        };
        
        utterance.onerror = () => {
          if (ttsFeedback) ttsFeedback.textContent = ` Speech error — please try again`;
        };
        
        window.speechSynthesis.speak(utterance);
      }
      
      speakBtn.addEventListener('click', textToSpeech);
    }

    function render() {
      if (currentPage === 0) {
        app.innerHTML = renderPage1();
        renderSoundboard('audioGridPage1', 'playStatusPage1');
        
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        
        pageIndicator.textContent = `Page ${currentPage + 1} / 2`;
        prevBtn.disabled = true;
        nextBtn.disabled = false;
        
        prevBtn.addEventListener('click', () => {
          if (currentPage > 0) {
            currentPage--;
            stopAudio();
            render();
          }
        });
        
        nextBtn.addEventListener('click', () => {
          if (currentPage < 1) {
            currentPage++;
            stopAudio();
            render();
          }
        });
      } else {
        app.innerHTML = renderPage2();
        renderSoundboard('audioGridPage2', 'playStatusPage2');
        setupTextToSpeech();
        
        const prevBtn = document.getElementById('prevPageBtn2');
        const nextBtn = document.getElementById('nextPageBtn2');
        const pageIndicator = document.getElementById('pageIndicator2');
        
        pageIndicator.textContent = `Page ${currentPage + 1} / 2`;
        prevBtn.disabled = false;
        nextBtn.disabled = true;
        
        prevBtn.addEventListener('click', () => {
          if (currentPage > 0) {
            currentPage--;
            stopAudio();
            render();
          }
        });
        
        nextBtn.addEventListener('click', () => {
          if (currentPage < 1) {
            currentPage++;
            stopAudio();
            render();
          }
        });
      }
    }
    
    render();
  </script>
</body>
</html>

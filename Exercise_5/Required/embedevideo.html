<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embedded Video</title>
<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;   
        align-items: center;      
        height: 100vh;
        background-color: #111;
    }

    video {
        width: 700px;
        max-width: 90%;
        border: 4px solid white;
        border-radius: 10px;
    }
</style>
</head>
<body>

<video controls loop poster="shoutingbeaver.jpg">
    <source src="shoutinganimal.mp4" type="video/mp4">
</video>

</body>
</html>

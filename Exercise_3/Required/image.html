<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Assessment Exercise</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
    }

    .gallery {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    figure {
      background: white;
      padding: 10px;
      border-radius: 10px;
      width: 300px;
    }

    img {
      width: 300px;
      height: auto; /* keeps aspect ratio */
      border-radius: 8px;

      /* CSS FILTERS applied to all images */
      filter: contrast(1.1) saturate(1.3) brightness(0.95) sepia(0.1);
    }

    figcaption {
      font-size: 12px;
      margin-top: 8px;
      color: #555;
    }
  </style>
</head>

<body>

<h1>Nature Image Gallery</h1>

<div class="gallery">

  <!-- IMAGE 1 -->
  <figure>
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800"
         alt="Mountain landscape with lake and forest"
         title="Mountain Lake View"
         width="300"
         height="200">

    <figcaption>
      License: Unsplash License (free for commercial use, no attribution required but appreciated)
    </figcaption>
  </figure>

  <!-- IMAGE 2 -->
  <figure>
    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800"
         alt="Dense green forest with sunlight"
         title="Forest Sunlight"
         width="300"
         height="200">

    <figcaption>
      License: Unsplash License (free for commercial use)
    </figcaption>
  </figure>

  <!-- IMAGE 3 -->
  <figure>
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800"
         alt="Ocean waves hitting rocky shore"
         title="Ocean Waves"
         width="300"
         height="200">

    <figcaption>
      License: Unsplash License (free for commercial use)
    </figcaption>
  </figure>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Petrol Cost Calculator</h1>

        <label for="price">Cost of Petrol per Liter (£)</label>
        <input type="number" id="price" value="1.72" step="0.01">

        <label for="liters">Liters Purchased</label>
        <input type="number" id="liters" value="0" step="0.1">

        <button onclick="calculateTotal()">Calculate Total</button>

        <p id="result">Total Cost: £0.00</p>

    </div>

    <script src="index.js"></script>

</body>
</html>

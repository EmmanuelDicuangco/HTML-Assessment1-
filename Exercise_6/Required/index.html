<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Page title -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Calculator</title>

    <!-- Link CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main calculator container -->
    <div class="container">

        <!-- Heading -->
        <h1>Petrol Cost Calculator</h1>

        <!-- Petrol price input -->
        <label for="price">Cost of Petrol per Liter (£)</label>
        <input type="number" id="price" value="1.72" step="0.01">

        <!-- Liters input -->
        <label for="liters">Liters Purchased</label>
        <input type="number" id="liters" value="0" step="0.1">

        <!-- Calculate button -->
        <button onclick="calculateTotal()">Calculate Total</button>

        <!-- Result -->
        <p id="result">Total Cost: £0.00</p>

    </div>

    <!-- Link JavaScript -->
    <script src="index.js"></script>

</body>
</html>
